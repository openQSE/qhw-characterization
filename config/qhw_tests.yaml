default-level: l1

levels:
  - name: smoke
    description: Environment check, discovery, and one smoke submission.
  - name: l1
    description: Smoke plus short timing-overhead and 1Q timing sweeps.
  - name: l2
    description: Smoke plus broader timing and parallelism sweeps.

tests:
  - name: env_check
    level: smoke
    script: scripts/env_check.py
    backend:
      default: auto
      direct:
        provider: iqm
      qfw:
        type: hardware
        capabilities:
          - superconducting

  - name: discover
    level: smoke
    script: scripts/discover.py
    backend:
      default: auto
      direct:
        provider: iqm
      qfw:
        type: hardware
        capabilities:
          - superconducting

  - name: submit_smoke
    level: smoke
    script: scripts/submit_smoke.py
    backend:
      default: auto
      direct:
        provider: iqm
      qfw:
        type: hardware
        capabilities:
          - superconducting

  - name: timing_overhead
    level: l1
    script: scripts/timing_overhead.py
    backend:
      default: auto
      direct:
        provider: iqm
      qfw:
        type: hardware
        capabilities:
          - superconducting
    args:
      l1:
        - --shots-sweep
        - env: QHW_RUN_ALL_OVERHEAD_SHOTS_SWEEP
          default: 1,10,100
        - --batch-sweep
        - env: QHW_RUN_ALL_OVERHEAD_BATCH_SWEEP
          default: 1,2
        - --batch-shots
        - env: QHW_RUN_ALL_OVERHEAD_BATCH_SHOTS
          default: "100"
        - --widths
        - env: QHW_RUN_ALL_OVERHEAD_WIDTHS
          default: "1"
        - --repetitions
        - env: QHW_RUN_ALL_OVERHEAD_REPETITIONS
          default: "1"
      l2:
        - --shots-sweep
        - env: QHW_RUN_ALL_OVERHEAD_SHOTS_SWEEP
          default: 1,10,100,1000
        - --batch-sweep
        - env: QHW_RUN_ALL_OVERHEAD_BATCH_SWEEP
          default: 1,2,4
        - --batch-shots
        - env: QHW_RUN_ALL_OVERHEAD_BATCH_SHOTS
          default: "100"
        - --widths
        - env: QHW_RUN_ALL_OVERHEAD_WIDTHS
          default: 1,2,4
        - --repetitions
        - env: QHW_RUN_ALL_OVERHEAD_REPETITIONS
          default: "1"

  - name: timing_1q
    level: l1
    script: scripts/timing_1q.py
    backend:
      default: auto
      direct:
        provider: iqm
      qfw:
        type: hardware
        capabilities:
          - superconducting
    args:
      l1:
        - --qubits
        - env: QHW_RUN_ALL_1Q_QUBITS
          default: QB1
        - --gates
        - env: QHW_RUN_ALL_1Q_GATES
          default: rx
        - --depths
        - env: QHW_RUN_ALL_1Q_DEPTHS
          default: 1,2
        - --shots
        - env: QHW_RUN_ALL_1Q_SHOTS
          default: "100"
        - --repetitions
        - env: QHW_RUN_ALL_1Q_REPETITIONS
          default: "1"
      l2:
        - --qubits
        - env: QHW_RUN_ALL_1Q_QUBITS
          default: all
        - --gates
        - env: QHW_RUN_ALL_1Q_GATES
          default: x,rx,ry
        - --depths
        - env: QHW_RUN_ALL_1Q_DEPTHS
          default: 1,2,4,8,16,32,64,128
        - --shots
        - env: QHW_RUN_ALL_1Q_SHOTS
          default: "100"
        - --repetitions
        - env: QHW_RUN_ALL_1Q_REPETITIONS
          default: "1"

  - name: parallel_1q
    level: l2
    script: scripts/parallel_1q.py
    backend:
      default: auto
      direct:
        provider: iqm
      qfw:
        type: hardware
        capabilities:
          - superconducting
    args:
      l2:
        - --qubits
        - env: QHW_RUN_ALL_PARALLEL_1Q_QUBITS
          default: QB1,QB2,QB3,QB4
        - --widths
        - env: QHW_RUN_ALL_PARALLEL_1Q_WIDTHS
          default: 1,2,4
        - --gates
        - env: QHW_RUN_ALL_PARALLEL_1Q_GATES
          default: rx
        - --depths
        - env: QHW_RUN_ALL_PARALLEL_1Q_DEPTHS
          default: 1,2
        - --shots
        - env: QHW_RUN_ALL_PARALLEL_1Q_SHOTS
          default: "100"
        - --repetitions
        - env: QHW_RUN_ALL_PARALLEL_1Q_REPETITIONS
          default: "1"

  - name: parallel_2q
    level: l2
    script: scripts/parallel_2q.py
    backend:
      default: auto
      direct:
        provider: iqm
      qfw:
        type: hardware
        capabilities:
          - superconducting
    args:
      l2:
        - --gates
        - env: QHW_RUN_ALL_PARALLEL_2Q_GATES
          default: auto
        - --matching-sizes
        - env: QHW_RUN_ALL_PARALLEL_2Q_MATCHING_SIZES
          default: 1,2
        - --matchings-per-size
        - env: QHW_RUN_ALL_PARALLEL_2Q_MATCHINGS_PER_SIZE
          default: "1"
        - --depths
        - env: QHW_RUN_ALL_PARALLEL_2Q_DEPTHS
          default: 1,2
        - --shots
        - env: QHW_RUN_ALL_PARALLEL_2Q_SHOTS
          default: "100"
        - --repetitions
        - env: QHW_RUN_ALL_PARALLEL_2Q_REPETITIONS
          default: "1"

  - name: readout
    level: l2
    script: scripts/readout.py
    backend:
      default: auto
      direct:
        provider: iqm
      qfw:
        type: hardware
        capabilities:
          - superconducting
    args:
      l2:
        - --qubits
        - env: QHW_RUN_ALL_READOUT_QUBITS
          default: QB1,QB2,QB3,QB4
        - --widths
        - env: QHW_RUN_ALL_READOUT_WIDTHS
          default: 1,2,4
        - --assignment-widths
        - env: QHW_RUN_ALL_READOUT_ASSIGNMENT_WIDTHS
          default: 1,2
        - --shots
        - env: QHW_RUN_ALL_READOUT_SHOTS
          default: "1000"
        - --repetitions
        - env: QHW_RUN_ALL_READOUT_REPETITIONS
          default: "1"

  - name: coherence
    level: l2
    script: scripts/coherence.py
    backend:
      default: auto
      direct:
        provider: iqm
      qfw:
        type: hardware
        capabilities:
          - superconducting
    args:
      l2:
        - --qubits
        - env: QHW_RUN_ALL_COHERENCE_QUBITS
          default: QB1,QB2,QB3,QB4
        - --experiments
        - env: QHW_RUN_ALL_COHERENCE_EXPERIMENTS
          default: t1,ramsey,echo
        - --delays-us
        - env: QHW_RUN_ALL_COHERENCE_DELAYS_US
          default: 1,2,4,8,16,32
        - --shots
        - env: QHW_RUN_ALL_COHERENCE_SHOTS
          default: "1000"
        - --repetitions
        - env: QHW_RUN_ALL_COHERENCE_REPETITIONS
          default: "1"

  - name: rb_1q
    level: l2
    script: scripts/rb_1q.py
    backend:
      default: auto
      direct:
        provider: iqm
      qfw:
        type: hardware
        capabilities:
          - superconducting
    args:
      l2:
        - --qubits
        - env: QHW_RUN_ALL_RB_1Q_QUBITS
          default: QB1,QB2
        - --lengths
        - env: QHW_RUN_ALL_RB_1Q_LENGTHS
          default: 1,2,4,8
        - --sequences
        - env: QHW_RUN_ALL_RB_1Q_SEQUENCES
          default: "2"
        - --shots
        - env: QHW_RUN_ALL_RB_1Q_SHOTS
          default: "1000"

  - name: rb_2q
    level: l2
    script: scripts/rb_2q.py
    backend:
      default: auto
      direct:
        provider: iqm
      qfw:
        type: hardware
        capabilities:
          - superconducting
    args:
      l2:
        - --max-edges
        - env: QHW_RUN_ALL_RB_2Q_MAX_EDGES
          default: "2"
        - --lengths
        - env: QHW_RUN_ALL_RB_2Q_LENGTHS
          default: 1,2,4
        - --sequences
        - env: QHW_RUN_ALL_RB_2Q_SEQUENCES
          default: "2"
        - --shots
        - env: QHW_RUN_ALL_RB_2Q_SHOTS
          default: "1000"

  - name: depth_limits
    level: l2
    script: scripts/depth_limits.py
    backend:
      default: auto
      direct:
        provider: iqm
      qfw:
        type: hardware
        capabilities:
          - superconducting
    args:
      l2:
        - --qubits
        - env: QHW_RUN_ALL_DEPTH_QUBITS
          default: QB1,QB2,QB3,QB4
        - --widths
        - env: QHW_RUN_ALL_DEPTH_WIDTHS
          default: 1,2,4
        - --families
        - env: QHW_RUN_ALL_DEPTH_FAMILIES
          default: ghz,mirror
        - --depths
        - env: QHW_RUN_ALL_DEPTH_DEPTHS
          default: 1,2,4
        - --shots
        - env: QHW_RUN_ALL_DEPTH_SHOTS
          default: "1000"
